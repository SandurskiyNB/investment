<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Выбор риск-профиля</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 8px; max-width: 600px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .question { margin-top: 20px; font-size: 18px; font-weight: bold; }
        .options { margin-top: 10px; margin-bottom: 30px; }
        .options label { display: block; padding: 10px; background: #e9ecef; margin: 5px 0; border-radius: 4px; cursor: pointer; }
        .options label:hover { background: #d4edda; }
        button { width: 100%; padding: 12px; background-color: #28A745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .back-link { display: block; margin-top: 20px; text-align: center; color: #0078D7; text-decoration: none; }
        .error { color: red; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Выбор риск-профиля</h2>
        
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" action="/process_survey">
            <div class="question">Какую максимальную просадку портфеля за год вы готовы выдержать?</div>
            <div class="options">
                <!-- Значения value будут отправлены на сервер -->
                <label><input type="radio" name="risk_level" value="CONSERVATIVE" required> Не более 5% (CONSERVATIVE)</label>
                <label><input type="radio" name="risk_level" value="MODERATE"> От 5% до 15% (MODERATE)</label>
                <label><input type="radio" name="risk_level" value="AGGRESSIVE"> Более 20% (AGGRESSIVE)</label>
            </div>
            <!-- ДОБАВЛЕНО ПОЛЕ СУММЫ -->
            <div class="question" style="margin-top: 10px;">Сумма инвестиций (руб.):</div>
            <input type="number" name="amount" min="100" value="10000" style="width: 100%; padding: 10px; font-size: 16px; margin-bottom: 20px; border-radius: 4px; border: 1px solid #ccc;">

            <button type="submit">Сформировать список активов и произвести расчёт</button>
        </form>
        
        <a href="/dashboard" class="back-link">⬅ Вернуться в личный кабинет</a>
    </div>
</body>
</html>
